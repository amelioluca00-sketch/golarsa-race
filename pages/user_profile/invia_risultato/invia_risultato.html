<!DOCTYPE html>

<html class="dark" lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" name="viewport"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<link rel="stylesheet" href="../../../src/animations.css">
<script id="tailwind-config">

            extend: {

                      "on-secondary-fixed-variant": "#004395",
                      "primary-container": "#c6f33f",
                      "surface-container-highest": "#353534",
                      "background": "#11111a",
                      "error": "#ffb4ab",
                      "surface-container": "#201f1f",
                      "inverse-primary": "#4f6600",
                      "on-secondary": "#002e6a",
                      "primary-fixed": "#c6f33f",
                      "on-surface": "#e5e2e1",
                      "on-secondary-container": "#b3c9ff",
                      "on-primary-fixed": "#161f00",
                      "surface-dim": "#131313",
                      "on-tertiary-fixed": "#410004",
                      "outline": "#8e937b",
                      "inverse-on-surface": "#313030",
                      "tertiary-fixed": "#ffdad7",
                      "tertiary-container": "#ffdad7",
                      "inverse-surface": "#e5e2e1",
                      "surface-container-lowest": "#0e0e0e",
                      "secondary-fixed-dim": "#aec6ff",
                      "surface-container-high": "#2a2a2a",
                      "surface-tint": "#aad61e",
                      "secondary-container": "#0351b0",
                      "on-tertiary-fixed-variant": "#930012",
                      "tertiary": "#ffffff",
                      "on-tertiary": "#680009",
                      "on-tertiary-container": "#c71623",
                      "on-error-container": "#ffdad6",
                      "secondary-fixed": "#d8e2ff",
                      "secondary": "#aec6ff",
                      "primary": "#ffffff",
                      "tertiary-fixed-dim": "#ffb3ad",
                      "on-background": "#e5e2e1",
                      "on-surface-variant": "#c4c9af",
                      "on-primary": "#283500",
                      "outline-variant": "#444935",
                      "surface-bright": "#3a3939",
                      "surface": "#131313",
                      "error-container": "#93000a",
                      "on-primary-fixed-variant": "#3b4d00",
                      "primary-fixed-dim": "#aad61e",
                      "on-error": "#690005",
                      "on-secondary-fixed": "#001a42",
                      "on-primary-container": "#546d00",
                      "surface-variant": "#353534",
                      "surface-container-low": "#1c1b1b"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",

                      "xl": "0.75rem",
                      "full": "9999px"

              "fontFamily": {
                      "headline": ["Epilogue"],

                      "label": ["Inter"]

            },
          }

<style>
    /* Disabilita zoom da doppio tap su mobile */
    html, body, * { touch-action: manipulation; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .text-shadow-glow {
            text-shadow: 0 0 20px rgba(209, 255, 75, 0.4);
        }
        html, body {
            overscroll-behavior: none;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        body {
            min-height: max(884px, 100dvh);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        * { -webkit-tap-highlight-color: transparent; }
        button, a, [role="button"] {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container relative">
<!-- Close Button Only -->
<div class="fixed top-6 right-6 z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high hover:opacity-80 transition-opacity active:scale-95 duration-150 shadow-lg" type="button" onclick="history.back()">
<span class="material-symbols-outlined text-on-surface" data-icon="close">close</span>
</button>
</div>
<main class="pt-12 md:pt-16 pb-6 md:pb-12 px-4 max-w-4xl mx-auto min-h-screen">
<section class="mb-5 md:mb-8 px-2">
<h2 class="text-3xl md:text-6xl font-headline font-black italic tracking-tighter uppercase mb-1">
            INSERISCI <span class="text-[#C5FF1A]">RISULTATO</span>
</h2>
<p class="text-on-surface-variant font-label uppercase tracking-widest text-[10px]">Inserisci il punteggio finale</p>
</section>
<div class="space-y-6">
<section class="relative bg-surface-container rounded-3xl p-4 md:p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/5 overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-[#C5FF1A]/5 blur-3xl -mr-10 -mt-10"></div>
<div class="grid grid-cols-1 gap-5 md:gap-8 relative z-10">
<div class="flex flex-col gap-5">
<!-- TU e AVVERSARIO in colonna con pulsantiera verticale -->
<div style="display:flex; flex-direction:column; align-items:center; gap:12px; width:100%;">
  <!-- TU -->
  <span class="font-label uppercase tracking-[0.2em] text-on-surface-variant text-xs italic">TU</span>
  <div style="display:flex; flex-direction:column; align-items:center; gap:8px; width:100%;">
    <button style="width:100%; height:64px; display:flex; align-items:center; justify-content:center;" class="rounded-2xl bg-[#C5FF1A] text-[#161f00] hover:opacity-90 active:scale-95 transition-all" type="button" onclick="changeScore('tu', 1)">
      <span class="material-symbols-outlined text-4xl font-bold" data-icon="add">add</span>
    </button>
    <div class="text-8xl font-headline font-black italic text-[#C5FF1A] text-shadow-glow leading-none text-center py-1" id="score-tu">0</div>
    <button style="width:100%; height:64px; display:flex; align-items:center; justify-content:center;" class="rounded-2xl bg-[#C5FF1A] text-[#161f00] hover:opacity-90 active:scale-95 transition-all" type="button" onclick="changeScore('tu', -1)">
      <span class="material-symbols-outlined text-4xl font-bold" data-icon="remove">remove</span>
    </button>
  </div>
  <!-- VS -->
  <div class="text-xl font-headline font-black italic text-surface-container-highest opacity-30">VS</div>
  <!-- AVVERSARIO -->
  <span class="font-label uppercase tracking-[0.2em] text-on-surface-variant text-xs italic">AVVERSARIO</span>
  <div style="display:flex; flex-direction:column; align-items:center; gap:8px; width:100%;">
    <button style="width:100%; height:64px; display:flex; align-items:center; justify-content:center;" class="rounded-2xl bg-surface-container-high border border-outline-variant/20 hover:bg-surface-container-highest active:scale-95 transition-all" type="button" onclick="changeScore('avv', 1)">
      <span class="material-symbols-outlined text-4xl font-bold" data-icon="add">add</span>
    </button>
    <div class="text-8xl font-headline font-black italic text-on-surface-variant leading-none text-center py-1" id="score-avv">0</div>
    <button style="width:100%; height:64px; display:flex; align-items:center; justify-content:center;" class="rounded-2xl bg-surface-container-high border border-outline-variant/20 hover:bg-surface-container-highest active:scale-95 transition-all" type="button" onclick="changeScore('avv', -1)">
      <span class="material-symbols-outlined text-4xl" data-icon="remove">remove</span>
    </button>
  </div>
</div>
</div>
</div>
</section>
<form class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant ml-2">Data Incontro</label>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-2xl py-4 px-5 text-on-surface focus:ring-2 focus:ring-[#C5FF1A] transition-all outline-none appearance-none font-body" type="date" id="data-incontro"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<div class="space-y-2">
<label class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant ml-2">Scegli Avversario</label>
<div class="relative group">
<select id="select-avv" class="w-full bg-surface-container-high border-none rounded-2xl py-4 px-5 pr-12 text-on-surface focus:ring-2 focus:ring-[#C5FF1A] transition-all outline-none appearance-none font-body relative z-0" style="background-image: none;">
<option disabled="" selected="" value="">Seleziona Player</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none z-10" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<div class="pt-3 md:pt-4">
<button class="w-full bg-gradient-to-b from-[#D4FF52] to-[#C5FF1A] text-[#161f00] font-headline font-black italic uppercase text-lg py-4 md:py-5 rounded-2xl border-t border-white/40 shadow-lg hover:brightness-110 transition-all active:scale-[0.98] flex items-center justify-center gap-3 group relative overflow-hidden" type="button" onclick="inviaRisultato()">
                    INVIA RISULTATO
                </button>
</div>
</form>
</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../../src/storage-manager.js?v=14"></script>
<script>
    var scores = { tu: 0, avv: 0 };

    // Data odierna come valore di default
    var today = new Date();
    var yyyy  = today.getFullYear();
    var mm    = String(today.getMonth() + 1).padStart(2, '0');
    var dd    = String(today.getDate()).padStart(2, '0');
    var todayStr = yyyy + '-' + mm + '-' + dd;
    document.getElementById('data-incontro').value = todayStr;
    document.getElementById('data-incontro').max   = todayStr;

    function changeScore(player, delta) {
        scores[player] = Math.max(0, scores[player] + delta);
        document.getElementById('score-' + player).textContent = scores[player];
    }

    // Carica dati dal torneo e popola il dropdown avversari
    document.addEventListener('DOMContentLoaded', async function () {
        var SM = window.StorageManager;
        var torneoId = localStorage.getItem('gr_torneo_id');
        if (!SM || !torneoId) return;

        var data;
        try { data = await SM.load(torneoId); } catch(e) { return; }
        if (!data || !data.players.length) return;

        var userId = localStorage.getItem('gr_user_id');
        var utente = userId ? data.players.find(function(p) { return p.id === userId; }) : null;

        var sel = document.getElementById('select-avv');
        if (!sel) return;
        sel.innerHTML = '<option value="" disabled selected>Seleziona Player</option>';
        data.players
            .filter(function (p) { return !utente || p.id !== utente.id; })
            .filter(function (p) { return p.stato === 'approvato'; })
            .forEach(function (p) {
                var opt = document.createElement('option');
                opt.value = p.id;
                var capitalizza = function(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1).toLowerCase() : ''; };
                opt.textContent = capitalizza(p.nome) + ' ' + capitalizza(p.cognome);
                sel.appendChild(opt);
            });
    });

    async function inviaRisultato() {
        var s1 = scores.tu, s2 = scores.avv;
        var SM = window.StorageManager;
        var torneoId = localStorage.getItem('gr_torneo_id');

        // ── Validazione punteggio ──────────────────────────────────────
        // Entrambi devono essere interi non negativi
        if (!Number.isInteger(s1) || !Number.isInteger(s2) || s1 < 0 || s2 < 0) {
            alert('⚠️ I punteggi devono essere numeri interi positivi.');
            return;
        }
        // Il vincitore deve avere più game del perdente (almeno 1 in più)
        if (s1 === s2) {
            alert('⚠️ Il risultato non può essere in pareggio. Il vincitore deve avere più game del perdente.');
            return;
        }
        if (s1 < s2) {
            // Tu hai meno game dell'avversario
            if (s2 - s1 < 1) {
                alert('⚠️ Il vincitore deve avere almeno 1 game in più del perdente.');
                return;
            }
        } else {
            if (s1 - s2 < 1) {
                alert('⚠️ Il vincitore deve avere almeno 1 game in più del perdente.');
                return;
            }
        }

        // ── Calcolo punti guadagnati ──────────────────────────────────
        // Vittoria: +100pt fissi
        // Bonus dominanza: se l'avversario non ha vinto nessun game → +2pt per game conquistato
        // Bonus resistenza: se perdi → +10pt per ogni game che hai vinto
        var hoVinto = s1 > s2;
        var bonusDominanza = (hoVinto && s2 === 0) ? s1 * 2 : 0;
        var bonusResistenza = (!hoVinto) ? s1 * 10 : 0;
        var puntiGuadagnati = hoVinto ? (100 + bonusDominanza) : bonusResistenza;

        if (!SM || !torneoId) {
            window.location.href = 'risultato_inviato/risultato_inviato.html?tu=' + s1 + '&avv=' + s2 + '&punti=' + puntiGuadagnati + '&vittoria=' + (hoVinto ? '1' : '0') + '&bonusD=' + bonusDominanza;
            return;
        }

        // Leggi dalla cache (già caricata da DOMContentLoaded)
        var data = SM.getTournamentData(torneoId);
        if (!data) {
            window.location.href = 'risultato_inviato/risultato_inviato.html?tu=' + s1 + '&avv=' + s2 + '&punti=' + puntiGuadagnati + '&vittoria=' + (hoVinto ? '1' : '0') + '&bonusD=' + bonusDominanza;
            return;
        }

        var userId = localStorage.getItem('gr_user_id');
        var utente = userId ? data.players.find(function(p) { return p.id === userId; }) : null;
        if (!utente && data.standings.length) utente = data.standings[0];
        if (!utente) {
            window.location.href = 'risultato_inviato/risultato_inviato.html?tu=' + s1 + '&avv=' + s2 + '&punti=' + puntiGuadagnati + '&vittoria=' + (hoVinto ? '1' : '0');
            return;
        }

        var sel   = document.getElementById('select-avv');
        var avvId = sel && sel.value;
        if (!avvId) {
            alert('Seleziona un avversario prima di inviare.');
            return;
        }

        // ── Controllo: stesso avversario già sfidato questa settimana (Lun–Dom) ──
        var dataIncontro = (document.getElementById('data-incontro') || {}).value
                           || new Date().toISOString().split('T')[0];
        if (userId) {
          var dObj = new Date(dataIncontro + 'T12:00:00');
          var dow  = dObj.getDay();
          var toMon = (dow === 0) ? -6 : (1 - dow);
          var mon = new Date(dObj); mon.setDate(dObj.getDate() + toMon);
          var sun = new Date(mon);  sun.setDate(mon.getDate() + 6);
          var monStr = mon.toISOString().split('T')[0];
          var sunStr = sun.toISOString().split('T')[0];
          var dupl = SM.getMatches(torneoId).find(function(m) {
            if (m.stato === 'rifiutata') return false;
            var md = m.data || m.date || '';
            if (md < monStr || md > sunStr) return false;
            return (m.giocatore1_id === userId && m.giocatore2_id === avvId) ||
                   (m.giocatore1_id === avvId  && m.giocatore2_id === userId);
          });
          if (dupl) {
            alert('⚠️ Hai già sfidato questo avversario questa settimana. Puoi sfidarlo di nuovo dalla prossima settimana (lunedì).');
            return;
          }
        }

        var avv = data.players.find(function(p) { return p.id === avvId; });

        // Disabilita bottone durante l'invio
        var btn = document.querySelector('button[onclick="inviaRisultato()"]');
        if (btn) { btn.disabled = true; btn.textContent = 'INVIO IN CORSO…'; }

        var nuovoMatch = {
            id:              'user_result_' + Date.now(),
            data:            dataIncontro,
            date:            dataIncontro,
            giocatore1_id:   utente.id,
            giocatore1_nome: utente.nomeCompleto || (utente.nome + ' ' + utente.cognome),
            giocatore2_id:   avvId,
            giocatore2_nome: avv ? (avv.nomeCompleto || avv.nome + ' ' + avv.cognome) : 'Avversario',
            score1:          s1,
            score2:          s2,
            punteggio:       s1 + '-' + s2,
            vincitore_id:    hoVinto ? utente.id : avvId,
            stato:           'in_attesa'
        };

        try {
            await SM.addPendingMatch(torneoId, nuovoMatch);
        } catch(e) {
            console.error('Errore invio risultato:', e);
        }

        var capitalizza = function(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1).toLowerCase() : ''; };
        var mioNome  = utente ? capitalizza(utente.nome) : 'Tu';
        var avvNome2 = avv    ? capitalizza(avv.nome)    : 'Avversario';
        window.location.href = 'risultato_inviato/risultato_inviato.html'
            + '?tu='       + s1
            + '&avv='      + s2
            + '&punti='    + puntiGuadagnati
            + '&vittoria=' + (hoVinto ? '1' : '0')
            + '&bonusD='   + bonusDominanza
            + '&mioNome='  + encodeURIComponent(mioNome)
            + '&avvNome='  + encodeURIComponent(avvNome2);
    }
</script>
<div class="fixed inset-0 -z-20 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[70%] h-[70%] bg-[#C5FF1A]/5 blur-[150px] rounded-full"></div>
<div class="absolute bottom-0 left-0 w-full h-[50%] bg-gradient-to-t from-black/60 to-transparent"></div>
</div>
<script src="../../../src/animations.js"></script>
</body></html>
