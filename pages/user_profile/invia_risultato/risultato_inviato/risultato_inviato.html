<!DOCTYPE html>
<html class="dark" lang="it"><head>
<meta charset="utf-8"/>
<meta name="apple-mobile-web-app-title" content="Ga Race"/>
<link rel="apple-touch-icon" href="/pages/assets/icona3-ga.png"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Risultato Inviato</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="../../../../src/animations.css">
<link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,900;1,900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-high": "#2a2a2a",
            "on-background": "#e5e2e1",
            "outline-variant": "#444935",
            "on-surface": "#e5e2e1",
            "primary-fixed-dim": "#aad61e",
            "secondary-container": "#0351b0",
            "primary-fixed": "#c6f33f",
            "on-surface-variant": "#c4c9af",
            "surface-container-low": "#1c1b1b",
            "primary": "#ffffff",
            "surface-dim": "#131313",
            "surface-container": "#201f1f",
            "on-secondary": "#002e6a",
            "inverse-primary": "#4f6600",
            "error-container": "#93000a",
            "surface-bright": "#3a3939",
            "surface-tint": "#aad61e",
            "tertiary": "#ffffff",
            "on-primary-fixed": "#161f00",
            "on-primary-container": "#546d00",
            "surface-container-highest": "#353534",
            "surface": "#131313",
            "outline": "#8e937b",
            "background": "#11111a",
            "primary-container": "#c6f33f",
            "on-primary": "#283500",
            "inverse-surface": "#e5e2e1",
            "surface-variant": "#353534",
            "secondary": "#aec6ff",
            "surface-container-lowest": "#0e0e0e",
            "error": "#ffb4ab"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Epilogue"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        }
      }

</script>
<style>
    /* Solo elementi interattivi bloccano il doppio tap */
    button, a { touch-action: manipulation; }

    /* Nessun overflow su html/body: lo scroll del documento funziona naturalmente */
    html, body { overflow-x: hidden; }

    /* Sfondo */
    .kinetic-bg {
        background-color: #0b0b15;
        background-image: radial-gradient(circle at 50% 40%, #181820 0%, #0b0b15 100%);
    }
    .broadcast-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* ── CERCHIO draw-in ── */
    @keyframes circleDrawIn {
        from { stroke-dashoffset: 290; }
        to   { stroke-dashoffset: 0; }
    }
    .circle-draw {
        stroke-dasharray: 290;
        stroke-dashoffset: 290;
        animation: circleDrawIn 0.7s cubic-bezier(0.4,0,0.2,1) 0.1s forwards;
    }

    /* ── CHECKMARK draw-in ── */
    @keyframes checkDrawIn {
        from { stroke-dashoffset: 80; }
        to   { stroke-dashoffset: 0; }
    }
    .check-draw {
        stroke-dasharray: 80;
        stroke-dashoffset: 80;
        animation: checkDrawIn 0.4s cubic-bezier(0.22,1,0.36,1) 0.75s forwards;
    }

    /* ── WRAPPER pop/bounce ── */
    @keyframes checkPop {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.18); }
        65%  { transform: scale(0.93); }
        82%  { transform: scale(1.07); }
        100% { transform: scale(1); }
    }
    .check-pop {
        animation: checkPop 0.55s cubic-bezier(0.22,1,0.36,1) 1.1s both;
    }

    /* ── GLOW pulse ── */
    @keyframes glowPulse {
        0%, 100% { opacity: 0.18; transform: scale(1); }
        50%       { opacity: 0.38; transform: scale(1.2); }
    }
    .glow-pulse {
        animation: glowPulse 2s ease-in-out 1.5s infinite;
    }

    /* ── TITOLO slide-up ── */
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }

    /* ── SCORE pop ── */
    @keyframes scorePop {
        0%   { opacity: 0; transform: scale(0.4) translateY(20px); }
        60%  { opacity: 1; transform: scale(1.18) translateY(-4px); }
        80%  { transform: scale(0.94) translateY(0); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .score-pop { animation: scorePop 0.55s cubic-bezier(0.22,1,0.36,1) both; }

    /* ── PUNTI bloom ── */
    @keyframes pointsBloom {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.22); text-shadow: 0 0 30px rgba(209,255,75,0.8); }
        70%  { transform: scale(0.95); }
        100% { transform: scale(1); text-shadow: 0 0 12px rgba(209,255,75,0.35); }
    }
    .points-bloom { animation: pointsBloom 0.6s cubic-bezier(0.22,1,0.36,1) both; }

    /* ── CARD fade+scale in ── */
    @keyframes cardIn {
        from { opacity: 0; transform: scale(0.88) translateY(16px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .card-in { animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both; }

    /* ── ROW fade-in ── */
    @keyframes rowIn {
        from { opacity: 0; transform: translateX(-8px); }
        to   { opacity: 1; transform: translateX(0); }
    }
    .row-in { animation: rowIn 0.35s cubic-bezier(0.22,1,0.36,1) both; }

    /* Safe area per iOS (notch / home indicator) */
    body {
        padding-bottom: env(safe-area-inset-bottom, 16px);
    }
</style>
</head>
<body class="kinetic-bg text-on-surface font-body">

<main class="w-full max-w-md mx-auto px-6 flex flex-col items-center text-center pt-10 pb-10">

    <!-- Spunta animata -->
    <div class="mb-5 relative check-pop" style="animation-delay:1.1s;">
        <div class="absolute inset-0 bg-[#C5FF1A] blur-[80px] opacity-20 rounded-full glow-pulse"></div>
        <svg class="w-24 h-24 text-[#C5FF1A] relative z-10" fill="none" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle class="circle-draw" cx="50" cy="50" r="46"
                stroke="currentColor" stroke-linecap="round" stroke-width="4"/>
            <path class="check-draw" d="M30 52L44 66L70 34"
                stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"/>
        </svg>
    </div>

    <!-- Titolo -->
    <div class="mb-2 slide-up" style="animation-delay:0.9s;">
        <h1 class="text-primary text-5xl font-headline font-black italic leading-tight tracking-tighter uppercase">
            RISULTATO<br>INVIATO!
        </h1>
    </div>

    <!-- VS label -->
    <p class="text-[0.65rem] uppercase tracking-[0.25em] text-neutral-500 mb-5 slide-up" style="animation-delay:1.1s;" id="vs-label">VS AVVERSARIO</p>

    <!-- Score -->
    <div class="flex items-center gap-8 mb-6">
        <div class="flex flex-col items-center score-pop" style="animation-delay:1.3s;">
            <span class="text-7xl font-headline font-black italic text-primary" id="score-home">–</span>
            <span class="text-[0.6rem] uppercase tracking-widest text-neutral-500 mt-1" id="label-home">TU</span>
        </div>
        <div class="h-16 w-[3px] bg-[#C5FF1A]/30 slide-up" style="transform: skewX(-20deg); animation-delay:1.45s;"></div>
        <div class="flex flex-col items-center score-pop" style="animation-delay:1.5s;">
            <span class="text-7xl font-headline font-black italic text-neutral-500" id="score-away">–</span>
            <span class="text-[0.6rem] uppercase tracking-widest text-neutral-500 mt-1" id="label-away">AVV</span>
        </div>
    </div>

    <!-- Card punti con breakdown — classe no-anim per evitare gr-rise da animations.js -->
    <div class="no-anim w-full broadcast-card rounded-[24px] overflow-hidden card-in mb-5" style="animation-delay:1.75s;">

        <!-- Header totale -->
        <div class="flex items-center justify-between px-5 pt-5 pb-4" style="border-bottom: 1px solid rgba(255,255,255,0.07);">
            <span class="text-sm font-headline font-black italic text-primary/80 tracking-tight uppercase">
                HAI GUADAGNATO
            </span>
            <span class="text-2xl font-headline font-black italic text-[#C5FF1A] tracking-tighter" id="points-display">
                +0 PUNTI
            </span>
        </div>

        <!-- Righe breakdown -->
        <div class="px-5 py-4 space-y-3">
            <!-- Riga vittoria (visibile solo se ha vinto) -->
            <div class="flex items-center justify-between row-in" id="row-vittoria-wrap" style="display:none;animation-delay:2s;">
                <span class="text-sm text-neutral-400">Vittoria</span>
                <span class="text-sm font-label font-semibold text-[#C5FF1A]">+100</span>
            </div>
            <!-- Bonus dominanza (visibile solo se vittoria senza concedere game) -->
            <div class="flex items-center justify-between row-in" id="row-dominanza-wrap" style="display:none;animation-delay:2.15s;">
                <span class="text-sm text-neutral-400" id="row-dominanza-label">Bonus dominanza</span>
                <span class="text-sm font-label font-semibold text-[#C5FF1A]" id="row-dominanza">+0</span>
            </div>
            <!-- Bonus resistenza (visibile solo se ha perso) -->
            <div class="flex items-center justify-between row-in" id="row-resistenza-wrap" style="display:none;animation-delay:2s;">
                <span class="text-sm text-neutral-400" id="row-resistenza-label">Bonus resistenza</span>
                <span class="text-sm font-label font-semibold text-[#C5FF1A]" id="row-resistenza">+0</span>
            </div>
        </div>
    </div>

    <!-- Bottone principale -->
    <button onclick="window.location.href='../../../home/home.html'"
        class="w-full bg-gradient-to-b from-[#D4FF52] to-[#C5FF1A] text-[#161f00] font-headline font-black italic uppercase tracking-wider text-lg py-5 rounded-[18px] border-t border-white/40 shadow-lg hover:brightness-105 active:scale-[0.98] transition-all slide-up"
        style="animation-delay:2s;" type="button">
        TORNA ALLA RACE
    </button>

</main>

<!-- Sfondo decorativo (fixed, non influenza lo scroll) -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-[-1]">
    <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-gradient-to-br from-[#C5FF1A]/10 to-transparent blur-3xl opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-gradient-to-tl from-[#C5FF1A]/10 to-transparent blur-3xl opacity-10"></div>
</div>

<script>
    var params    = new URLSearchParams(window.location.search);
    var scoreTu   = parseInt(params.get('tu'),     10);
    var scoreAvv  = parseInt(params.get('avv'),    10);
    var vittoria  = params.get('vittoria') === '1';
    var bonusD    = parseInt(params.get('bonusD'), 10) || 0;
    var mioNome   = params.get('mioNome') || 'TU';
    var avvNome   = params.get('avvNome') || 'AVV';
    var TARGET    = parseInt(params.get('punti'),  10);
    if (isNaN(TARGET)) TARGET = 0;

    // Score
    if (!isNaN(scoreTu))  document.getElementById('score-home').textContent = scoreTu;
    if (!isNaN(scoreAvv)) document.getElementById('score-away').textContent = scoreAvv;

    // Nomi giocatori
    document.getElementById('vs-label').textContent   = 'VS ' + avvNome.toUpperCase();
    document.getElementById('label-home').textContent = mioNome.toUpperCase();
    document.getElementById('label-away').textContent = avvNome.toUpperCase();

    // Breakdown punti
    if (vittoria) {
        // Vittoria: mostra riga "+100"
        var wv = document.getElementById('row-vittoria-wrap');
        if (wv) { wv.style.display = 'flex'; wv.classList.add('row-in'); }
        // Bonus dominanza: solo se l'avversario ha 0 game
        if (bonusD > 0) {
            var wd = document.getElementById('row-dominanza-wrap');
            var dl = document.getElementById('row-dominanza-label');
            var dv = document.getElementById('row-dominanza');
            if (wd) { wd.style.display = 'flex'; wd.classList.add('row-in'); }
            if (dl && !isNaN(scoreTu)) dl.textContent = 'Bonus dominanza (' + scoreTu + ' × 2pt)';
            if (dv) dv.textContent = '+' + bonusD;
        }
    } else {
        // Sconfitta: mostra bonus resistenza
        var wr = document.getElementById('row-resistenza-wrap');
        if (wr) { wr.style.display = 'flex'; wr.classList.add('row-in'); }
        if (!isNaN(scoreTu)) {
            var rl = document.getElementById('row-resistenza-label');
            var rv = document.getElementById('row-resistenza');
            if (rl) rl.textContent = 'Bonus resistenza (' + scoreTu + ' × 10pt)';
            if (rv) rv.textContent = '+' + TARGET;
        }
    }

    /* ── Counter punti con easing ── */
    var DURATION = TARGET === 0 ? 200 : 900;
    var DELAY    = 1900;
    var el = document.getElementById('points-display');

    function easeOutExpo(t) {
        return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
    }

    setTimeout(function () {
        var start = performance.now();
        function tick(now) {
            var elapsed  = now - start;
            var progress = Math.min(elapsed / DURATION, 1);
            var val      = Math.round(easeOutExpo(progress) * TARGET);
            el.textContent = '+' + val + ' PUNTI';
            if (progress < 1) {
                requestAnimationFrame(tick);
            } else {
                el.textContent = '+' + TARGET + ' PUNTI';
                el.classList.add('points-bloom');
            }
        }
        requestAnimationFrame(tick);
    }, DELAY);
</script>
<!-- animations.js NON caricato: questa pagina ha le proprie animazioni CSS
     e non ha bisogno del motore scroll-triggered, che aggiungerebbe
     gr-rise (opacity:0) alla broadcast-card bloccandola -->
</body></html>
