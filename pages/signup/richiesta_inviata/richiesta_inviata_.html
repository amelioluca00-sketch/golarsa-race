<!DOCTYPE html>
<html class="dark" lang="it">
<head>
<meta charset="utf-8"/>
<meta name="apple-mobile-web-app-title" content="Ga Race"/>
<link rel="apple-touch-icon" href="/pages/assets/icona2-ga.png"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#08080f"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="../../../src/animations.css">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary-container": "#c6f33f",
                    "background": "#11111a",
                    "surface-container": "#201f1f",
                    "on-surface": "#e5e2e1",
                    "on-surface-variant": "#c4c9af",
                    "surface-container-high": "#2a2a2a",
                    "surface-container-low": "#1c1b1b",
                    "on-primary-container": "#546d00",
                },
                fontFamily: {
                    "headline": ["Epilogue"],
                    "body": ["Inter"],
                    "label": ["Inter"]
                }
            }
        }
    }
</script>
<style>
    /* Disabilita zoom da doppio tap su mobile */
    html, body, * { touch-action: manipulation; }

    body {
        min-height: 100dvh;
        background: #11111a;
        font-family: 'Inter', sans-serif;
    }

    /* spring easing con overshoot */
    :root { --spring: cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* ── Pulsante X ── */
    .btn-close {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 50;
        width: 40px;
        height: 40px;
        border-radius: 9999px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s, transform 0.15s;
        backdrop-filter: blur(6px);
        opacity: 0;
        transform: scale(0);
        animation: pop-in 0.4s var(--spring) 0.1s forwards;
    }
    .btn-close:hover {
        background: rgba(209,255,75,0.12);
        border-color: rgba(209,255,75,0.4);
        transform: scale(1.1);
    }
    .btn-close:active { transform: scale(0.9); }

    /* ── POP principale della spunta ── */
    .checkmark-wrapper {
        opacity: 0;
        transform: scale(0);
        animation: pop-in 0.5s var(--spring) 0.2s forwards;
    }

    /* ── Ring che esplode dopo il pop ── */
    .ring-burst {
        position: absolute;
        inset: -10px;
        border-radius: 9999px;
        border: 3px solid #C5FF1A;
        opacity: 0;
        animation: ring-burst 0.6s ease-out 0.55s forwards;
    }
    @keyframes ring-burst {
        0%   { transform: scale(0.85); opacity: 0.8; }
        100% { transform: scale(1.6);  opacity: 0; }
    }

    /* ── Spunta che si disegna (veloce, dopo il pop) ── */
    .checkmark-path {
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: draw-check 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.45s forwards;
    }
    @keyframes draw-check {
        to { stroke-dashoffset: 0; }
    }

    /* ── Micro-bounce della spunta quando compare ── */
    .checkmark-path-wrap {
        transform-origin: center;
        transform-box: fill-box;
        animation: path-pop 0.3s var(--spring) 0.78s both;
    }
    @keyframes path-pop {
        from { transform: scale(0.7); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Glow pulsante (su wrapper esterno separato) ── */
    .glow-wrapper {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        animation: pulse-glow 2.5s ease-in-out 1.5s infinite;
    }
    @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 6px rgba(209,255,75,0.25)); }
        50%       { filter: drop-shadow(0 0 26px rgba(209,255,75,0.75)); }
    }

    /* ── Titolo: pop con spring ── */
    .pop-title {
        opacity: 0;
        transform: scale(0.7) translateY(10px);
        animation: pop-in-title 0.45s var(--spring) 0.55s forwards;
    }
    @keyframes pop-in-title {
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Card: sale dal basso con spring ── */
    .pop-card-anim {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
        animation: pop-card 0.45s var(--spring) 0.75s forwards;
    }
    @keyframes pop-card {
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Keyframe universale pop-in ── */
    @keyframes pop-in {
        from { opacity: 0; transform: scale(0); }
        to   { opacity: 1; transform: scale(1); }
    }

    /* ── Card ── */
    .pop-up-card {
        background: linear-gradient(180deg, #272733 0%, #1c1b1b 100%);
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5), inset 0 1px 0 0 rgba(255,255,255,0.05);
    }

    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
</style>
</head>
<body class="text-on-surface selection:bg-primary-container">

<!-- Pulsante X per tornare indietro -->
<button class="btn-close" onclick="history.back()" aria-label="Torna indietro">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L13 13M13 1L1 13" stroke="#e5e2e1" stroke-width="2" stroke-linecap="round"/>
    </svg>
</button>

<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12">

    <!-- Spunta animata -->
    <div class="glow-wrapper mb-10">
        <!-- Ring che esplode -->
        <div class="ring-burst"></div>
        <!-- SVG che fa pop -->
        <div class="checkmark-wrapper">
            <svg fill="none" height="110" viewBox="0 0 120 120" width="110" xmlns="http://www.w3.org/2000/svg">
                <!-- Cerchio (statico, compare con il pop dell'SVG) -->
                <circle cx="60" cy="60" r="58"
                    stroke="#C5FF1A" stroke-width="4"
                    fill="none"/>
                <!-- Spunta che si disegna subito dopo -->
                <path class="checkmark-path" d="M35 62L52 79L85 43"
                    stroke="#C5FF1A" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"/>
            </svg>
        </div>
    </div>

    <!-- Titolo -->
    <div class="mb-10 text-center pop-title">
        <h2 class="font-black italic text-5xl md:text-7xl leading-none tracking-tighter text-white uppercase"
            style="font-family: 'Epilogue', sans-serif;">
            RICHIESTA
        </h2>
        <h2 class="font-black italic text-5xl md:text-7xl leading-none tracking-tighter uppercase"
            style="font-family: 'Epilogue', sans-serif; color: #C5FF1A;">
            INVIATA!
        </h2>
    </div>

    <!-- Card approvazione -->
    <div class="w-full max-w-md pop-up-card p-8 text-center rounded-2xl border-t border-white/10 pop-card-anim">
        <div class="space-y-4">
            <div class="flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl animate-pulse" style="color: #C5FF1A;">hourglass_empty</span>
                <span class="text-xs uppercase tracking-widest font-bold italic" style="color: #C5FF1A; font-family: 'Inter', sans-serif;">
                    In attesa di approvazione
                </span>
            </div>
            <p class="text-sm leading-relaxed" style="color: #c4c9af; font-family: 'Inter', sans-serif;">
                La tua richiesta è stata correttamente inviata. Riceverai una mail di notifica non appena potrai accedere alla gara.
            </p>
        </div>
    </div>

</main>
<div class="fixed bottom-8 left-0 right-0 flex justify-center px-6">
  <button onclick="window.location.href='../signup.html'" class="w-full max-w-md py-4 rounded-2xl border border-white/10 text-white/50 font-headline font-black italic uppercase tracking-widest text-sm hover:text-white hover:border-white/20 transition-all">
    ← TORNA AL LOGIN
  </button>
</div>
<script src="../../../src/animations.js"></script>
</body>
</html>
