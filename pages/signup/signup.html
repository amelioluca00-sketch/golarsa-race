<style>
    /* Disabilita zoom da doppio tap su mobile */
    html, body, * { touch-action: manipulation; }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9), 0 0 50px rgba(209, 255, 75, 0.08);
        }
        .court-gradient {
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.3) 0%, rgba(10, 10, 10, 0.85) 60%, rgba(10, 10, 10, 1) 100%);
        }
        .stroke-text {
            -webkit-text-stroke: 1px #c5ff1a;
        }
        .input-glow:focus {
            box-shadow: none !important;
        }

        /* Form field collapse animation */
        .form-collapsible {
            overflow: hidden;
            transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.45s cubic-bezier(0.4,0,0.2,1), margin-top 0.55s cubic-bezier(0.4,0,0.2,1);
        }
        .form-collapsible.collapsed {
            max-height: 0 !important;
            opacity: 0;
            margin-top: 0 !important;
        }

        /* iOS zoom & highlight fix + no glow on focus */
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            box-shadow: none !important;
            --tw-ring-shadow: 0 0 #0000 !important;
            --tw-ring-color: transparent !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
            -webkit-tap-highlight-color: transparent;
        }
        input, select, textarea {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            transition: none !important;
        }

        /* Pop-up Button Effect from SCREEN_183 */
        .popup-button {
            background: linear-gradient(180deg, #e3ff8c 0%, #C5FF1A 100%) !important;
            box-shadow:
                inset 0 1px 0 0 rgba(255, 255, 255, 0.4) !important;
            position: relative;
            overflow: hidden;
        }
        .popup-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.6);
            opacity: 0.8;
        }
    /* Legal prose inside modal */
    .legal-prose h3 {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #c5ff1a;
        margin-top: 1.1rem;
        margin-bottom: 0.3rem;
    }
    .legal-prose h3:first-child { margin-top: 0; }
    .legal-prose p { color: rgba(255,255,255,0.65); line-height: 1.6; font-size: 0.8rem; }
    /* ── Mobile / iOS hardening ── */
    html, body {
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
    }
    body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    * { -webkit-tap-highlight-color: transparent; }
    button, a, [role="button"] {
        -webkit-tap-highlight-color: transparent;

<script>
    function switchAuth(tab) {
        const slider            = document.getElementById('switchSlider');
        const btnI              = document.getElementById('btnIscriviti');
        const btnA              = document.getElementById('btnAccedi');
        const fieldsNomeCognome = document.getElementById('fieldsNomeCognome');
        const fieldsExtra       = document.getElementById('fieldsExtra');
        const fieldsTorneo      = document.getElementById('fieldsTorneo');
        const submitBtn         = document.getElementById('submitBtn');
        const pill              = document.getElementById('authSwitcherPill');

        // Campi obbligatori solo nella modalità iscriviti
        var iscrivitiOnlyFields = ['inp-nome', 'inp-cognome', 'inp-tel'];

        if (tab === 'accedi') {
            slider.style.transform = 'translateX(100%)';
            btnI.style.color = 'rgba(255,255,255,0.5)';
            btnA.style.color = '#0a0a0a';
            fieldsNomeCognome.classList.add('collapsed');
            fieldsExtra.classList.add('collapsed');
            fieldsTorneo.classList.add('collapsed');
            pill.style.marginBottom = '1rem';
            submitBtn.textContent = 'ACCEDI';
            // Rimuovi required dai campi nascosti
            iscrivitiOnlyFields.forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.removeAttribute('required');
            });
            // Sempre abilitato in modalità login
            submitBtn.disabled = false;
            submitBtn.style.opacity = '';
        } else {
            slider.style.transform = 'translateX(0)';
            btnA.style.color = 'rgba(255,255,255,0.5)';
            btnI.style.color = '#0a0a0a';
            fieldsNomeCognome.classList.remove('collapsed');
            fieldsExtra.classList.remove('collapsed');
            fieldsTorneo.classList.remove('collapsed');
            pill.style.marginBottom = '2.5rem';
            submitBtn.textContent = 'ISCRIVITI ORA';
            // Ripristina required sui campi visibili
            iscrivitiOnlyFields.forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.setAttribute('required', '');
            });
            // Ricalcola stato pulsante in base ai tornei disponibili
            var selT = document.getElementById('inp-torneo');
            var hasOptions = selT && selT.options.length > 1;
            submitBtn.disabled = !hasOptions;
            submitBtn.style.opacity = hasOptions ? '' : '0.5';
        }
    }

    /* ── Legal Modal ── */
    const legalDefaults = {
        termini: `<h3>1. Accettazione</h3><p>Utilizzando la piattaforma GOLARSA RACE accetti in pieno i presenti termini e condizioni. Se non li accetti, ti preghiamo di non utilizzare il servizio.</p><h3>2. Utilizzo della piattaforma</h3><p>La piattaforma è riservata agli utenti registrati e agli amministratori dei tornei. Ogni utente è responsabile delle informazioni inserite e dei risultati dichiarati.</p><h3>3. Iscrizioni e quote</h3><p>Le quote di iscrizione ai tornei sono stabilite dall'organizzatore e devono essere versate entro il termine indicato. L'iscrizione si considera confermata solo dopo il pagamento.</p><h3>4. Modifiche ai tornei</h3><p>L'organizzatore si riserva il diritto di modificare date, quote e regolamenti dandone comunicazione agli iscritti con congruo anticipo.</p><h3>5. Responsabilità</h3><p>GOLARSA RACE declina ogni responsabilità per danni diretti o indiretti derivanti dall'utilizzo della piattaforma o dalla partecipazione ai tornei.</p><h3>6. Legge applicabile</h3><p>I presenti termini sono regolati dalla legge italiana. Per qualsiasi controversia è competente il foro di residenza dell'organizzatore.</p>`,
        privacy: `<h3>Titolare del trattamento</h3><p>Il titolare del trattamento dei dati personali è l'organizzatore del torneo registrato sulla piattaforma GOLARSA RACE.</p><h3>Dati raccolti</h3><p>Raccogliamo esclusivamente i dati necessari alla partecipazione ai tornei: nome, cognome, indirizzo e-mail e, se previsto, i dati di pagamento della quota di iscrizione.</p><h3>Finalità del trattamento</h3><p>I tuoi dati vengono utilizzati per: gestire l'iscrizione al torneo, comunicare aggiornamenti sul torneo, elaborare i pagamenti delle quote di partecipazione.</p><h3>Conservazione dei dati</h3><p>I dati personali vengono conservati per il tempo strettamente necessario alle finalità indicate e comunque non oltre 12 mesi dalla chiusura del torneo.</p><h3>Diritti dell'interessato</h3><p>Hai il diritto di accedere ai tuoi dati, rettificarli, cancellarli o limitarne il trattamento. Per esercitare questi diritti contatta l'organizzatore attraverso la piattaforma.</p><h3>Cookie</h3><p>La piattaforma utilizza solo cookie tecnici essenziali al funzionamento. Non vengono utilizzati cookie di profilazione o di terze parti a fini pubblicitari.</p>`
    };
    const legalTitles = { termini: 'Termini e Condizioni', privacy: 'Privacy Policy' };

    function openLegalModal(section) {
        const saved = localStorage.getItem('gr_content_' + section);
        document.getElementById('legalModalTitle').textContent = legalTitles[section];
        document.getElementById('legalModalBody').innerHTML = saved || legalDefaults[section];
        document.getElementById('legalModal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }
    function closeLegalModal() {
        document.getElementById('legalModal').classList.add('hidden');
        document.body.style.overflow = '';
    }

    function closeAdminModal() {
        document.getElementById('adminModal').classList.add('hidden');
        document.getElementById('adminPasswordInput').value = '';
        document.getElementById('adminError').classList.add('hidden');
    }
    function submitAdminPassword() {
        const pw = document.getElementById('adminPasswordInput').value;
        const err = document.getElementById('adminError');
        if (pw === 'golarsa2025') {
            closeAdminModal();
            localStorage.setItem('gr_role', 'admin');
            sessionStorage.setItem('gr_admin_auth', '1');
            window.location.href = '../dashboard/accesso_dashboard.html';
        } else {
            err.classList.remove('hidden');
            document.getElementById('adminPasswordInput').value = '';
            document.getElementById('adminPasswordInput').focus();
        }
    }

    // ── Messaggio errore/successo login ──
    function showLoginError(msg) {
        let el = document.getElementById('loginError');
        if (!el) {
            el = document.createElement('p');
            el.id = 'loginError';
            el.style.cssText = 'margin-top:12px;font-size:11px;font-weight:700;text-align:center;letter-spacing:.05em;color:rgba(255,180,171,0.9);padding:10px 14px;background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.2);border-radius:12px;';
            document.getElementById('submitBtn').insertAdjacentElement('afterend', el);
        }
        el.textContent = msg;
        el.style.display = 'block';
    }
    function clearLoginError() {
        const el = document.getElementById('loginError');
        if (el) el.style.display = 'none';
    }

    // ── Carica tornei nel dropdown ──
    async function caricaTornei() {
        const SM = window.StorageManager;
        if (!SM) return;
        const sel = document.getElementById('inp-torneo');
        const noMsg = document.getElementById('noTorneiMsg');
        const submitBtn = document.getElementById('submitBtn');
        try {
            const tornei = await SM.loadTournaments();
            sel.innerHTML = '';
            if (!tornei || tornei.length === 0) {
                sel.innerHTML = '<option value="" disabled selected>Nessun torneo disponibile</option>';
                noMsg.classList.remove('hidden');
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            } else {
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.disabled = true;
                placeholder.selected = true;
                placeholder.textContent = 'Seleziona torneo';
                sel.appendChild(placeholder);
                tornei.forEach(function(t) {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = t.nome;
                    sel.appendChild(opt);
                });
                noMsg.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.style.opacity = '';
            }
        } catch(err) {
            console.error('[signup] caricaTornei:', err);
        }
    }

    // ── Form submit: accedi → home, iscriviti → richiesta_inviata ──
    document.querySelector('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const isAccedi = document.getElementById('submitBtn').textContent.trim() === 'ACCEDI';
        const submitBtn = document.getElementById('submitBtn');
        const SM = window.StorageManager;
        if (!SM) { showLoginError('Errore di sistema. Ricarica la pagina.'); return; }

        // Disabilita pulsante durante la richiesta
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.6';
        clearLoginError();

        try {
            if (isAccedi) {
                const email = document.getElementById('inp-email').value.trim().toLowerCase();
                if (!email) { submitBtn.disabled = false; submitBtn.style.opacity = ''; return; }

                const risultato = await SM.findPlayerByEmail(email);
                if (risultato) {
                    SM.setSession(risultato.torneo.id, risultato.player.id, email, 'player');
                    window.location.href = '../home/home.html';
                } else {
                    showLoginError('Nessun account trovato per questa email. Contatta l\'organizzatore.');
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '';
                }
            } else {
                // Iscriviti
                const torneoId = document.getElementById('inp-torneo').value;
                if (!torneoId) {
                    showLoginError('Seleziona un torneo prima di iscriverti.');
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '';
                    return;
                }
                const nome    = document.getElementById('inp-nome').value.trim();
                const cognome = document.getElementById('inp-cognome').value.trim();
                const email   = document.getElementById('inp-email').value.trim().toLowerCase();
                const telefono = document.getElementById('inp-tel').value.trim();
                const telValido = telefono && telefono !== '+39' && telefono.length > 4;
                if (!nome || !cognome || !email || !telValido) {
                    showLoginError('Tutti i campi sono obbligatori.');
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '';
                    return;
                }
                const nazSel  = document.getElementById('inp-naz');
                const nazTesto = nazSel ? nazSel.options[nazSel.selectedIndex].text : 'Italia';
                // Estrai bandiera ed etichetta
                const bandiera = nazTesto.split(' ')[0] || '';
                const nazionalita = nazTesto.split(' ').slice(1).join(' ') || nazTesto;

                const playerData = {
                    nome:         nome,
                    cognome:      cognome,
                    nomeCompleto: nome + ' ' + cognome,
                    email:        email,
                    telefono:     document.getElementById('inp-tel').value.trim(),
                    nazionalita:  nazionalita,
                    bandiera:     bandiera,
                };

                const player = await SM.registerPlayer(torneoId, playerData);
                if (player) {
                    window.location.href = 'richiesta_inviata/richiesta_inviata_.html';
                } else {
                    showLoginError('Errore durante l\'iscrizione. Riprova.');
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '';
                }
            }
        } catch(err) {
            console.error('[signup] submit:', err);
            showLoginError('Errore di connessione. Riprova.');
            submitBtn.disabled = false;
            submitBtn.style.opacity = '';
        }
    });

    // ── Avvia caricamento tornei al caricamento pagina ──
    document.addEventListener('DOMContentLoaded', function() {
        // Attendi che StorageManager sia pronto (caricato dopo questo script)
        var pollSM = setInterval(function() {
            if (window.StorageManager) {
                clearInterval(pollSM);
                caricaTornei();
            }
        }, 50);
    });
</script>
