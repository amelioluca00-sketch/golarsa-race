<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .text-small-caps { font-variant: small-caps; }
        .win-rate-gauge { transform: rotate(-90deg); }
        .gauge-path { stroke-dasharray: 283; stroke-dashoffset: 70; transition: stroke-dashoffset 2s ease-out; }
        html, body { overscroll-behavior: none; }
        body { background-color: #0e0e0e; color: #e5e2e1; font-family: 'Inter', sans-serif; }
        
        /* Cinematic Card Style */
        .cinematic-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%), #161616;
            box-shadow: 
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1),
                0 10px 30px -10px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }
        .cinematic-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(209, 255, 75, 0.2), transparent);
        }

        /* Pop-up Button Effect */
        .popup-button {
            background: linear-gradient(180deg, #e3ff8c 0%, #D1FF4B 100%);
            box-shadow: 
                inset 0 1px 0 0 rgba(255, 255, 255, 0.4),
                0 4px 15px rgba(209, 255, 75, 0.3);
            position: relative;
            overflow: hidden;
        }
        .popup-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.6);
            opacity: 0.8;
        }

        /* Entry Animations */
        @keyframes cardFlip {
            from {
                opacity: 0;
                transform: perspective(700px) rotateX(-80deg);
                transform-origin: top center;
            }
            60% { opacity: 1; }
            to {
                opacity: 1;
                transform: perspective(700px) rotateX(0deg);
                transform-origin: top center;
            }
        }
        .anim-in {
            opacity: 0;
            animation: cardFlip 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes pageExit {
            from { transform: translateY(0);    opacity: 1; }
            to   { transform: translateY(60px); opacity: 0; }
        }
        .page-exit {
            animation: pageExit 0.28s cubic-bezier(0.4, 0, 1, 1) forwards;
        }
    </style>
</head>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const gaugePath = document.querySelector('.gauge-path');
        if (!gaugePath) return;
        gaugePath.style.transition = 'none';
        gaugePath.style.strokeDashoffset = '283';
        setTimeout(function () {
            gaugePath.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(0.4, 0, 0.2, 1)';
            gaugePath.style.strokeDashoffset = '70'; // 75% su cerchio r=45, circumference=283
        }, 500);
    });
</script>
<script>
  // Back button handler (keep independent of demo data)
  document.addEventListener('DOMContentLoaded', function () {
    const backBtn = document.querySelector('header button');
    if (backBtn) backBtn.addEventListener('click', () => {
      document.body.classList.add('page-exit');
      setTimeout(() => window.location.href = '../home/home.html', 280);
    });
  });
</script>
<script>
  function setBtnSfida(telefono, nome) {
    var btn = document.getElementById('btn-sfida');
    if (!btn) return;
    var tel = (telefono || '').toString().replace(/\D/g, '');
    if (tel.indexOf('00') === 0) tel = tel.substring(2);
    if (tel && tel.length > 6) {
      var msg = encodeURIComponent('Ciao ' + (nome || '') + '! Ti sfido a una partita di Golarsa Race.');
      btn.href = 'https://wa.me/' + tel + '?text=' + msg;
      btn.setAttribute('target', '_blank');
      btn.setAttribute('rel', 'noopener');
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
      btn.removeAttribute('title');
    } else {
      btn.removeAttribute('href');
      btn.style.opacity = '0.5';
      btn.style.pointerEvents = 'none';
      btn.title = 'Numero non disponibile';
    }
  }
  window.setBtnSfida = setBtnSfida;
</script>
