  <script>
    // ─── Player Data ─────────────────────────────────────────────────────────
    let players = [
      { id:"p1", nome:"Marco",    cognome:"Rossi",    email:"marco.rossi@email.com",    telefono:"+39 333 1234567", nazionalita:"🇮🇹 Italia",         coach:"Alberto Ferrari" },
      { id:"p2", nome:"Andrea",   cognome:"Bianchi",  email:"andrea.bianchi@email.com", telefono:"+39 347 2345678", nazionalita:"🇮🇹 Italia",         coach:"Matteo Romano" },
      { id:"p3", nome:"Luca",     cognome:"Verdi",    email:"luca.verdi@email.com",     telefono:"+39 320 3456789", nazionalita:"🇮🇹 Italia",         coach:"Sara Conti" },
      { id:"p4", nome:"Matteo",   cognome:"Neri",     email:"matteo.neri@email.com",    telefono:"+39 389 4567890", nazionalita:"🇮🇹 Italia",         coach:"Alberto Ferrari" },
      { id:"p5", nome:"Giovanni", cognome:"Rizzo",    email:"g.rizzo@email.com",        telefono:"+39 366 5678901", nazionalita:"🇮🇹 Italia",         coach:"Luca Bianchi" },
      { id:"p6", nome:"Carlos",   cognome:"Mendez",   email:"c.mendez@email.com",       telefono:"+34 612 345678",  nazionalita:"🇪🇸 Spagna",         coach:"Pedro García" },
      { id:"p7", nome:"Antoine",  cognome:"Dubois",   email:"a.dubois@email.com",       telefono:"+33 6 12345678",  nazionalita:"🇫🇷 Francia",        coach:"Jean Leclerc" },
      { id:"p8", nome:"James",    cognome:"Wilson",   email:"j.wilson@email.com",       telefono:"+44 7700 900000", nazionalita:"🇬🇧 Regno Unito",    coach:"David Smith" },
    ];

    let editingId = null;

    // ─── Render ──────────────────────────────────────────────────────────────
    function renderPlayers(list) {
      const container = document.getElementById('players-list');
      container.innerHTML = '';
      if (list.length === 0) {
        container.innerHTML = `<p class="font-label text-[0.7rem] text-gray-600 uppercase tracking-widest text-center py-8">Nessun giocatore trovato</p>`;
        return;
      }
      list.forEach(p => {
        const card = document.createElement('div');
        card.className = 'cinematic-card rounded-2xl px-4 py-3.5 border border-white/5 flex items-center justify-between hover:brightness-110 transition-all duration-300 player-card';
        card.innerHTML = `
          <div class="flex flex-col min-w-0 mr-3">
            <span class="font-label text-[0.58rem] font-semibold text-gray-500 uppercase tracking-[0.15em]" style="line-height:1; margin-bottom:3px; display:block">${p.nome}</span>
            <span class="font-headline italic font-black text-2xl text-white uppercase tracking-tighter" style="line-height:1.1; display:block">${p.cognome}</span>
          </div>
          <button onclick="openModal('${p.id}')" class="cinematic-icon w-10 h-10 rounded-full flex items-center justify-center border border-white/5 flex-shrink-0 hover:border-[#c5ff1a]/30 transition-colors">
            <span class="material-symbols-outlined text-[#c5ff1a] text-lg">edit</span>
          </button>
        `;
        container.appendChild(card);
      });
    }

    // ─── Filter ──────────────────────────────────────────────────────────────
    function filterPlayers(query) {
      const q = query.toLowerCase().trim();
      if (!q) { renderPlayers(players); return; }
      renderPlayers(players.filter(p =>
        p.nome.toLowerCase().includes(q) || p.cognome.toLowerCase().includes(q)
      ));
    }

    // ─── Modal open/close ────────────────────────────────────────────────────
    function openModal(id) {
      const p = players.find(x => x.id === id);
      if (!p) return;
      editingId = id;

      document.getElementById('modal-title').textContent = `${p.nome} ${p.cognome}`;
      document.getElementById('f-nome').value       = p.nome;
      document.getElementById('f-cognome').value    = p.cognome;
      document.getElementById('f-email').value      = p.email;
      document.getElementById('f-telefono').value   = p.telefono;
      document.getElementById('f-coach').value      = p.coach;

      // Set nationality select
      const sel = document.getElementById('f-nazionalita');
      for (let i = 0; i < sel.options.length; i++) {
        if (sel.options[i].text === p.nazionalita) { sel.selectedIndex = i; break; }
      }

      document.getElementById('edit-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('edit-modal').classList.remove('open');
      document.body.style.overflow = '';
      editingId = null;
      // reset to form view
      document.getElementById('delete-confirm').style.display = 'none';
      document.getElementById('form-content').style.display   = '';
    }

    // ─── Delete flow ─────────────────────────────────────────────────────────
    function showDeleteConfirm() {
      const p = players.find(x => x.id === editingId);
      if (!p) return;
      document.getElementById('delete-name').textContent = `${p.nome} ${p.cognome}`;
      document.getElementById('form-content').style.display   = 'none';
      document.getElementById('delete-confirm').style.display = '';
      // scroll to top of modal
      document.querySelector('.modal-box').scrollTop = 0;
    }
    function cancelDelete() {
      document.getElementById('delete-confirm').style.display = 'none';
      document.getElementById('form-content').style.display   = '';
    }
    function confirmDelete() {
      players = players.filter(x => x.id !== editingId);
      closeModal();
      renderPlayers(players);
    }

    function handleModalBackdropClick(e) {
      if (e.target === e.currentTarget) closeModal();
    }

    // ─── Save ────────────────────────────────────────────────────────────────
    function savePlayer() {
      const p = players.find(x => x.id === editingId);
      if (!p) return;
      p.nome        = document.getElementById('f-nome').value.trim()      || p.nome;
      p.cognome     = document.getElementById('f-cognome').value.trim()   || p.cognome;
      p.email       = document.getElementById('f-email').value.trim();
      p.telefono    = document.getElementById('f-telefono').value.trim();
      p.nazionalita = document.getElementById('f-nazionalita').value;
      p.coach       = document.getElementById('f-coach').value.trim();
      closeModal();
      renderPlayers(players);
    }

    // ─── Drawer ──────────────────────────────────────────────────────────────
    function openDrawer() {
      document.getElementById('drawer-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('drawer-backdrop').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ─── Nav tabs ────────────────────────────────────────────────────────────
    function setTab(btn) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }

    // ─── Page navigation with fade-out ───────────────────────────────────────
    function navigateTo(url) {
      const overlay = document.getElementById('page-out');
      overlay.classList.add('active');
      setTimeout(() => { location.href = url; }, 180);
    }

    // ─── Init ────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => renderPlayers(players));
  </script>
