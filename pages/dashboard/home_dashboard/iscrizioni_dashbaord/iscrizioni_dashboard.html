  <script>
    /* ─── Tab config ─── */
    const tabs = {
      attesa:    { activeClass: 'active-attesa',    labelColor: '#c5ff1a',           labelEl: 'label-attesa'    },
      approvate: { activeClass: 'active-approvate', labelColor: 'rgb(74,222,128)',   labelEl: 'label-approvate' },
      rifiutate: { activeClass: 'active-rifiutate', labelColor: 'rgb(255,180,171)',  labelEl: 'label-rifiutate' },
    };
    let current = 'attesa';

    function switchStatus(key) {
      if (key === current) return;

      // reset old tab card
      const oldCfg = tabs[current];
      const oldTab = document.getElementById('tab-' + current);
      oldTab.classList.remove(oldCfg.activeClass);
      document.getElementById(oldCfg.labelEl).style.color = 'rgba(255,255,255,0.35)';

      // hide old panel
      document.getElementById('panel-' + current).classList.remove('active');

      // activate new
      current = key;
      const cfg = tabs[key];
      const newTab = document.getElementById('tab-' + key);
      newTab.classList.add(cfg.activeClass);
      document.getElementById(cfg.labelEl).style.color = cfg.labelColor;

      // show new panel + re-trigger animations
      const panel = document.getElementById('panel-' + key);
      panel.classList.add('active');
      panel.querySelectorAll('.reg-card').forEach((c, i) => {
        c.style.animation = 'none';
        c.offsetHeight;
        c.style.animation = '';
        c.style.animationDelay = (i * 0.05 + 0.03) + 's';
      });
    }

    /* ─── Approva ─── */
    function approva(btn) {
      const card = btn.closest('.reg-card');
      const nome = card.querySelector('.font-headline').textContent.trim();
      const dateEl = card.querySelector('.font-label');
      const dateStr = dateEl ? dateEl.textContent.replace('ISCRITTO IL ', '').trim() : '';

      card.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
      card.style.opacity = '0';
      card.style.transform = 'translateX(24px)';
      updateCount('attesa', -1);
      updateCount('approvate', +1);

      setTimeout(() => {
        card.remove();
        appendCard('approvate', nome, dateStr, 'approved');
      }, 260);
    }

    /* ─── Rifiuta ─── */
    function rifiuta(btn) {
      const card = btn.closest('.reg-card');
      const nome = card.querySelector('.font-headline').textContent.trim();
      const dateEl = card.querySelector('.font-label');
      const dateStr = dateEl ? dateEl.textContent.replace('ISCRITTO IL ', '').trim() : '';

      card.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
      card.style.opacity = '0';
      card.style.transform = 'translateX(-24px)';
      updateCount('attesa', -1);
      updateCount('rifiutate', +1);

      setTimeout(() => {
        card.remove();
        appendCard('rifiutate', nome, dateStr, 'rejected');
      }, 260);
    }

    function updateCount(key, delta) {
      const el = document.getElementById('count-' + key);
      el.textContent = Math.max(0, parseInt(el.textContent) + delta);
    }

    function appendCard(panel, nome, dateStr, type) {
      const container = document.getElementById('panel-' + panel);
      const isApproved = type === 'approved';
      const iconName = isApproved ? 'check_circle' : 'cancel';
      const colorClass = isApproved ? 'text-green-400' : 'text-error';
      const labelText = isApproved ? 'Approvato' : 'Rifiutato';

      const div = document.createElement('div');
      div.className = 'reg-card cinematic-card rounded-2xl p-4 border border-white/5 hover:brightness-110 transition-all duration-200';
      div.style.animationDelay = '0s';
      div.innerHTML = `
        <div class="flex flex-col">
          <span class="font-label text-[0.58rem] text-gray-500 uppercase tracking-widest">ISCRITTO IL ${dateStr}</span>
          <span class="font-headline italic font-black text-2xl text-white uppercase tracking-tighter">${nome}</span>
        </div>
        <div class="flex items-center gap-2 mt-3 pt-3 border-t border-white/5">
          <span class="material-symbols-outlined ${colorClass}" style="font-size:1.1rem;font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24">${iconName}</span>
          <span class="font-label text-[0.6rem] ${colorClass} font-bold uppercase tracking-widest">${labelText}</span>
        </div>`;
      container.prepend(div);
    }

    /* ─── Drawer ─── */
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
    }
    function closeDrawerOnBackdrop(e) {
      if (e.target === document.getElementById('drawer')) closeDrawer();
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
  </script>
