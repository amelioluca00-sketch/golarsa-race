<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLARSA RACE — Animated Logo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 1;
    }
    .logo-wrap {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10; pointer-events: none; user-select: none;
    }
    #logo-img {
      width: clamp(300px, 52vw, 800px);
      display: block; opacity: 0;
      will-change: opacity, filter, transform;
    }
    .replay-btn {
      position: fixed; bottom: 28px; right: 28px; z-index: 100;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.55);
      font-family: Arial, sans-serif; font-size: 12px;
      padding: 7px 16px; border-radius: 20px; cursor: pointer;
      letter-spacing: 0.08em; transition: all 0.2s;
    }
    .replay-btn:hover { background: rgba(204,255,0,0.12); border-color: rgba(204,255,0,0.35); color: #CCFF00; }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="logo-wrap"><img id="logo-img" src="GOLARSA-RACE.png" alt="GOLARSA RACE"/></div>
<button class="replay-btn" id="replayBtn">↺ REPLAY</button>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const logo = document.getElementById('logo-img');
const replayBtn = document.getElementById('replayBtn');

let W, H, rafId, startTime;
let tick = 0;

/* state */
let speedLines = [];
let ambientLines = [];
let rays = [];
let slashes = [];
let didSpeedLines = false;
let didReveal = false;
let didRays = false;
let nextSlash = 3.5;

const clamp = (v,a,b) => Math.max(a, Math.min(b,v));

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ── SPEED LINES (intro burst) ── */
function spawnIntroLines() {
  for (let i = 0; i < 65; i++) {
    const isG = Math.random() > 0.52;
    speedLines.push({
      y: H/2 + (Math.random()-.5)*H*1.6,
      x: -300 - Math.random()*500,
      len: 90 + Math.random()*380,
      spd: 45 + Math.random()*75,
      life: 1, decay: .018 + Math.random()*.034,
      isG, w: .4 + Math.random()*2
    });
  }
}

/* ── AMBIENT SPEED LINES (continuous subtle) ── */
function spawnAmbientLine() {
  const isG = Math.random() > 0.6;
  ambientLines.push({
    y: H/2 + (Math.random()-.5)*H*1.2,
    x: -Math.random()*300,
    len: 40 + Math.random()*180,
    spd: 18 + Math.random()*30,
    life: 1, decay: .03 + Math.random()*.05,
    isG, w: .3 + Math.random()*1
  });
}

/* ── LIGHT RAYS (from logo centre) ── */
function spawnRays() {
  const angles = [0, 15, -15, 30, -30, 180, 165, -165, 150, -150];
  for (const deg of angles) {
    const rad = deg * Math.PI / 180;
    rays.push({ angle: rad, life: 1, decay: .012, len: Math.max(W,H)*1.1, w: deg%30===0?2:.8 });
  }
}

/* ── DIAGONAL SLASH (speed cut) ── */
function spawnSlash() {
  slashes.push({
    x: -W*.1, y: 0,
    w: 18 + Math.random()*30,
    spd: W * (0.022 + Math.random()*.015),
    life: 1, decay: .04,
    isG: Math.random() > .45
  });
}

/* ── RESET ── */
function reset() {
  cancelAnimationFrame(rafId);
  startTime = null; tick = 0;
  speedLines=[]; ambientLines=[]; rays=[]; slashes=[];
  didSpeedLines=false; didReveal=false; didRays=false;
  nextSlash = 3.2;
  logo.style.cssText = 'width:clamp(300px,52vw,800px);display:block;opacity:0;filter:blur(0px) brightness(1);transform:scale(1)';
  rafId = requestAnimationFrame(frame);
}

/* ── MAIN ── */
function frame(ts) {
  if (!startTime) startTime = ts;
  const t = (ts - startTime) / 1000;
  tick++;

  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  /* === PHASE 0: rumble (0–0.55s) === */
  if (t < 0.6) {
    const k = Math.max(0, (0.5-t)/0.5);
    const sx = (Math.random()-.5)*k*10, sy = (Math.random()-.5)*k*5;
    /* draw canvas shifted */
    ctx.save(); ctx.translate(sx,sy); ctx.restore();
    /* centre anticipation glow */
    const pg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,H*.5);
    pg.addColorStop(0, `rgba(255,255,255,${k*.07})`);
    pg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
  }

  /* === INTRO SPEED LINES (0.3s) === */
  if (t>=.3 && !didSpeedLines) { spawnIntroLines(); didSpeedLines=true; }

  for (const sl of speedLines) {
    sl.x += sl.spd; sl.life -= sl.decay;
    if (sl.life<=0 || sl.x>W+sl.len) continue;
    ctx.save();
    ctx.globalAlpha = clamp(sl.life*.78,0,.78);
    ctx.strokeStyle = sl.isG ? '#CCFF00' : '#fff';
    ctx.lineWidth = sl.w;
    ctx.beginPath(); ctx.moveTo(sl.x, sl.y); ctx.lineTo(sl.x+sl.len, sl.y);
    ctx.stroke(); ctx.restore();
  }

  /* === LOGO REVEAL (0.9s) === */
  if (t>=.75 && t<.9) {
    logo.style.opacity = `${((t-.75)/.15)*.28}`;
    logo.style.filter = 'blur(14px) brightness(2.5)';
    logo.style.transform = 'scale(1.06)';
  }
  if (t>=.9 && !didReveal) {
    didReveal = true;
    logo.style.transition = 'opacity .22s ease-out, filter .45s ease-out, transform .5s cubic-bezier(.175,.885,.32,1.5)';
    logo.style.opacity = '1';
    logo.style.filter = 'blur(0px) brightness(1)';
    logo.style.transform = 'scale(1)';
  }

  /* === WHITE SLAM FLASH (0.9s) === */
  if (t>=.9 && t<1.1) {
    const ft = (t-.9)/.2;
    ctx.fillStyle = `rgba(255,255,255,${(1-ft)*.35})`;
    ctx.fillRect(0,0,W,H);
  }

  /* === LIGHT RAYS from logo (1.3s) === */
  if (t>=1.3 && !didRays) { spawnRays(); didRays=true; }
  for (const r of rays) {
    r.life -= r.decay;
    if (r.life<=0) continue;
    const ex = W/2 + Math.cos(r.angle)*r.len;
    const ey = H/2 + Math.sin(r.angle)*r.len;
    ctx.save();
    ctx.globalAlpha = clamp(r.life*.18,0,.18);
    ctx.strokeStyle = r.angle===0||Math.abs(r.angle-Math.PI)<.1 ? '#fff' : '#CCFF00';
    ctx.lineWidth = r.w;
    ctx.beginPath(); ctx.moveTo(W/2,H/2); ctx.lineTo(ex,ey);
    ctx.stroke(); ctx.restore();
  }

  /* === GREEN SLAM FLASH (1.6s) === */
  if (t>=1.6 && t<1.85) {
    const ft = (t-1.6)/.25;
    ctx.fillStyle = `rgba(180,255,0,${(1-ft)*.2})`;
    ctx.fillRect(0,0,W,H);
  }

  /* === AMBIENT SPEED LINES (continuous after 2s) === */
  if (t>=2.0 && tick%4===0 && Math.random()<.45) spawnAmbientLine();
  for (const al of ambientLines) {
    al.x += al.spd; al.life -= al.decay;
    if (al.life<=0 || al.x>W+al.len) continue;
    ctx.save();
    ctx.globalAlpha = clamp(al.life*.35,0,.35);
    ctx.strokeStyle = al.isG ? '#CCFF00' : '#fff';
    ctx.lineWidth = al.w;
    ctx.beginPath(); ctx.moveTo(al.x,al.y); ctx.lineTo(al.x+al.len,al.y);
    ctx.stroke(); ctx.restore();
  }

  /* === DIAGONAL SPEED SLASHES (every ~2s after 3s) === */
  if (t>=nextSlash) {
    spawnSlash();
    nextSlash = t + 1.8 + Math.random()*2.2;
  }
  for (const sl of slashes) {
    sl.x += sl.spd; sl.life -= sl.decay;
    if (sl.life<=0) continue;
    ctx.save();
    ctx.globalAlpha = clamp(sl.life*.55,0,.55);
    /* diagonal strip */
    const col = sl.isG ? '#CCFF00' : '#fff';
    const grad = ctx.createLinearGradient(sl.x,0,sl.x+sl.w,0);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(0.3, col);
    grad.addColorStop(0.7, col);
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    /* skewed strip across full height */
    ctx.moveTo(sl.x - H*.18, 0);
    ctx.lineTo(sl.x - H*.18 + sl.w, 0);
    ctx.lineTo(sl.x + H*.18 + sl.w, H);
    ctx.lineTo(sl.x + H*.18, H);
    ctx.closePath();
    ctx.fill(); ctx.restore();
  }

  /* === AMBIENT GLOW + LOGO BRIGHTNESS PULSE (t>2.1) === */
  if (t>=2.1) {
    const phase = t * 1.8;
    const pulse = .5 + .5*Math.sin(phase);
    const sharpPulse = Math.pow(pulse, 3); /* snappier */

    /* sharp radial flash behind logo */
    const gr = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.42);
    gr.addColorStop(0, `rgba(204,255,0,${.03+.04*sharpPulse})`);
    gr.addColorStop(.35, `rgba(255,255,255,${.015+.02*sharpPulse})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);

    /* logo brightness snap */
    const br = 1 + .22*sharpPulse;
    logo.style.filter = `blur(0px) brightness(${br.toFixed(2)})`;
  }

  /* === HORIZONTAL SCAN LINE (sweeps down once at reveal) === */
  if (t>=.9 && t<2.2) {
    const progress = clamp((t-.9)/1.3, 0, 1);
    const sy2 = progress*H;
    ctx.save();
    ctx.globalAlpha = (1-progress)*.4;
    ctx.strokeStyle = '#CCFF00';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0,sy2); ctx.lineTo(W,sy2);
    ctx.stroke(); ctx.restore();
  }

  /* === VIGNETTE === */
  if (t>=.3) {
    const vig = ctx.createRadialGradient(W/2,H/2,H*.18,W/2,H/2,H*.9);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,0,0,0.62)');
    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  }

  rafId = requestAnimationFrame(frame);
}

replayBtn.addEventListener('click', reset);
reset();
</script>
</body>
</html>
